# DurianDetector IDS Watcher configuration
# Copy this file to config.local.yaml and adjust paths for your environment.

api:
  url: "http://localhost:8001"

  # Authentication — use ONE of the following:

  # Option 1 (recommended): API key — never expires, generated from Settings page
  # or via POST /api/api-keys with a label like "ids-watcher".
  api_key: ""

  # Option 2: JWT access token — works but expires after ~30 minutes.
  # Only use this for quick testing. For production, use an API key.
  token: ""

# Batch settings — the watcher groups new lines and POSTs them in batches.
batch:
  size: 50          # Max alerts per POST request
  interval: 5       # Seconds to wait before flushing a partial batch

# Enable / disable each IDS watcher independently.
# Set `enabled: true` and point `path` to the log file the IDS writes to.

suricata:
  enabled: false
  path: "/var/log/suricata/eve.json"

zeek:
  enabled: false
  path: "/opt/zeek/logs/current/notice.log"

snort:
  enabled: false
  path: "/var/log/snort/alert_json.txt"

kismet:
  enabled: false
  # Kismet exposes a REST API — the watcher polls it instead of tailing a file.
  url: "http://localhost:2501"
  api_key: ""
  poll_interval: 5   # Seconds between polls
